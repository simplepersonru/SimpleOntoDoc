name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test (.NET 9)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore SimpleOntoDoc.sln

      - name: Build
        run: dotnet build SimpleOntoDoc.sln --no-restore --configuration Release

      # -----------------------------------------------------------------------
      # Тест 1 (модульные) + Тест 2 (интеграционный без PlantUML):
      # PlantUML-тесты исключаются из обычного прогона через фильтр категории,
      # чтобы не зависеть от сети. Они запускаются отдельным шагом ниже.
      # -----------------------------------------------------------------------
      - name: Run unit and integration tests (no PlantUML)
        run: >
          dotnet test SimpleOntoDoc.Tests/SimpleOntoDoc.Tests.csproj
          --no-build
          --configuration Release
          --verbosity normal
          --filter "FullyQualifiedName!~PlantUmlIntegrationTests"

      # -----------------------------------------------------------------------
      # Тест 3 (PlantUML): локально поднимаем plantuml/plantuml-server в Docker
      # (аналогично publish.bash), дожидаемся готовности и запускаем тесты,
      # передавая URL через SIMPLEDOC_PLANTUML_URL. Если тесты не пройдут
      # (например, контейнер не поднялся), это не блокирует билд.
      # -----------------------------------------------------------------------
      - name: Start local PlantUML Docker container
        run: |
          docker run --rm -d --name plantuml_ci -p 18080:8080 plantuml/plantuml-server:jetty
          echo "Waiting for PlantUML to become ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:18080 > /dev/null; then
              echo "PlantUML is ready."
              break
            fi
            sleep 2
          done

      - name: Run PlantUML integration tests
        env:
          SIMPLEDOC_PLANTUML_URL: http://localhost:18080
        run: >
          dotnet test SimpleOntoDoc.Tests/SimpleOntoDoc.Tests.csproj
          --no-build
          --configuration Release
          --verbosity normal
          --filter "FullyQualifiedName~PlantUmlIntegrationTests"
        continue-on-error: true

      - name: Stop local PlantUML Docker container
        if: always()
        run: docker stop plantuml_ci || true
